<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedRead - Speed Reading App</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #e2e8f0;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #334155;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95em;
            resize: vertical;
            transition: border-color 0.3s;
            background: #0f172a;
            color: #e2e8f0;
        }

        textarea:focus {
            outline: none;
            border-color: #64748b;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-start {
            background: #3b82f6;
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-pause {
            background: #f59e0b;
            color: white;
        }

        .btn-pause:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-reset {
            background: #64748b;
            color: white;
        }

        .btn-reset:hover {
            background: #475569;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(100, 116, 139, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .display-section {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .word-display {
            font-size: 4em;
            font-weight: bold;
            color: #ffffff;
            word-wrap: break-word;
            line-height: 1.2;
            min-height: 100px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            justify-items: stretch;
            margin: 0;
            font-family: 'Atkinson Hyperlegible Mono', monospace;
            gap: 0;
        }

        .middle-letter {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            line-height: 0.8;
        }

        .middle-letter::before {
            content: "-";
            color: #ef4444;
            font-size: 0.8em;
        }

        .middle-letter::after {
            content: "-";
            color: #ef4444;
            font-size: 0.8em;
        }

        .progress {
            font-size: 0.9em;
            color: #64748b;
            margin-top: 15px;
        }

        .info-section {
            background: #1e293b;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .speed-display {
            text-align: center;
            font-size: 1.5em;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        .speed-value {
            font-weight: bold;
            color: #3b82f6;
            font-size: 1.3em;
        }

        .instructions {
            font-size: 0.85em;
            color: #94a3b8;
            line-height: 1.6;
        }

        .instructions p {
            margin-bottom: 8px;
        }

        .key-hint {
            display: inline-block;
            background: #334155;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-weight: 600;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SpeedRead</h1>
        <p class="subtitle">Learn to read faster</p>

        <div class="input-section">
            <label for="textInput">Paste your text here:</label>
            <textarea id="textInput" placeholder="Paste the text you want to speed read..."></textarea>
        </div>

        <div class="display-section">
            <div class="word-display" id="wordDisplay"><span style="grid-column: 1 / -1;">Click "Start" to begin</span></div>
            <div class="progress">
                <span id="progressText"></span>
            </div>
        </div>

        <div class="speed-display">
            Speed: <span class="speed-value" id="speedDisplay">300</span> WPM
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn">Start</button>
            <button class="btn-pause" id="pauseBtn" disabled>Pause</button>
            <button class="btn-reset" id="resetBtn" disabled>Reset</button>
        </div>

        <div class="info-section">
            <div class="instructions">
                <p>📌 <span class="key-hint">↑</span> <span class="key-hint">↓</span> Adjust speed (±25 WPM) | <span class="key-hint">←</span> <span class="key-hint">→</span> Rewind/Skip 25 words</p>
                <p>📌 <span class="key-hint">Space</span> Pause/Resume | Min: 50 WPM | Max: 1000 WPM</p>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const wordDisplay = document.getElementById('wordDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const progressText = document.getElementById('progressText');

        let speed = 300; // WPM
        let words = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        let displayTimeout = null;

        const MIN_SPEED = 50;
        const MAX_SPEED = 1000;
        const SPEED_INCREMENT = 25;

        // Update speed display
        function updateSpeedDisplay() {
            speedDisplay.textContent = speed;
        }

        // Calculate delay between words (in milliseconds)
        function getWordDelay() {
            return (60000 / speed); // milliseconds per word
        }

        // Display next word with middle letter highlighted in red
        // Keep the middle letter centered horizontally on screen
        function displayNextWord() {
            if (currentIndex < words.length) {
                const word = words[currentIndex];
                const middleIndex = Math.floor(word.length / 2);

                const before = word.substring(0, middleIndex);
                const middle = word[middleIndex];
                const after = word.substring(middleIndex + 1);

                // Use CSS Grid: 3 columns where middle column (auto) holds the middle letter
                // Left column (1fr) right-aligns the before text
                // Right column (1fr) left-aligns the after text
                // This keeps the middle letter anchored at the exact center
                wordDisplay.innerHTML = `<span style="grid-column: 1; text-align: right;">${before}</span><span class="middle-letter" style="grid-column: 2;">${middle}</span><span style="grid-column: 3; text-align: left;">${after}</span>`;

                // Reset font size to default
                wordDisplay.style.fontSize = '4em';

                // Check if the word overflows, and if so, reduce font size
                if (wordDisplay.scrollWidth > wordDisplay.offsetWidth) {
                    let fontSize = 4; // in em
                    while (wordDisplay.scrollWidth > wordDisplay.offsetWidth && fontSize > 0.5) {
                        fontSize -= 0.2;
                        wordDisplay.style.fontSize = fontSize + 'em';
                    }
                }

                progressText.textContent = `${currentIndex + 1} / ${words.length}`;
                currentIndex++;

                if (isPlaying && !isPaused) {
                    displayTimeout = setTimeout(displayNextWord, getWordDelay());
                }
            } else {
                finish();
            }
        }

        // Start reading
        function start() {
            const text = textInput.value.trim();
            if (!text) {
                alert('Please paste some text first!');
                return;
            }

            words = text.split(/\s+/).filter(word => word.length > 0);
            if (words.length === 0) {
                alert('Please paste some text first!');
                return;
            }

            currentIndex = 0;
            isPlaying = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            resetBtn.disabled = false;
            textInput.disabled = true;

            displayNextWord();
        }

        // Pause reading
        function pause() {
            if (isPlaying && !isPaused) {
                isPaused = true;
                pauseBtn.textContent = 'Resume';
                clearTimeout(displayTimeout);
            } else if (isPaused) {
                isPaused = false;
                pauseBtn.textContent = 'Pause';
                displayNextWord();
            }
        }

        // Reset reading
        function reset() {
            isPlaying = false;
            isPaused = false;
            currentIndex = 0;
            clearTimeout(displayTimeout);
            wordDisplay.innerHTML = '<span style="grid-column: 1 / -1;">Click "Start" to begin</span>';
            wordDisplay.style.fontSize = '4em';
            progressText.textContent = '';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = 'Pause';
            resetBtn.disabled = true;
            textInput.disabled = false;
        }

        // Finish reading
        function finish() {
            isPlaying = false;
            wordDisplay.innerHTML = '<span style="grid-column: 1 / -1;">Finished! 🎉</span>';
            wordDisplay.style.fontSize = '4em';
            pauseBtn.disabled = true;
            startBtn.disabled = false;
            textInput.disabled = false;
        }

        // Adjust speed
        function adjustSpeed(increment) {
            const newSpeed = speed + increment;
            if (newSpeed >= MIN_SPEED && newSpeed <= MAX_SPEED) {
                speed = newSpeed;
                updateSpeedDisplay();

                // If currently playing, restart the word display with new speed
                if (isPlaying && !isPaused) {
                    clearTimeout(displayTimeout);
                    displayTimeout = setTimeout(displayNextWord, getWordDelay());
                }
            }
        }

        // Rewind 25 words
        function rewind() {
            if (isPlaying) {
                currentIndex = Math.max(0, currentIndex - 25);
                clearTimeout(displayTimeout);
                displayNextWord();
            }
        }

        // Skip ahead 25 words
        function skipAhead() {
            if (isPlaying) {
                currentIndex = Math.min(words.length, currentIndex + 25);
                clearTimeout(displayTimeout);
                displayNextWord();
            }
        }

        // Event listeners
        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                adjustSpeed(SPEED_INCREMENT);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                adjustSpeed(-SPEED_INCREMENT);
            } else if (e.key === ' ') {
                e.preventDefault();
                if (isPlaying) {
                    pause();
                } else if (!isPlaying && currentIndex > 0) {
                    isPaused = false;
                    pauseBtn.textContent = 'Pause';
                    displayNextWord();
                }
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                rewind();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                skipAhead();
            }
        });

        // Initialize
        updateSpeedDisplay();
    </script>
</body>
</html>
